<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAR SG | Safeguarding Product Sovereignty</title>
    <style>
        /* CSS RESET FOR ALIGNMENT FIX */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --sovereign-blue: #003366; /* Your Signature Color */
            --accent-gold: #C5A059;
            --light-bg: #F4F7F9;
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fff;
        }

        /* HEADER ALIGNMENT FIX */
        header {
            background-color: var(--sovereign-blue);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* HERO SECTION COLOR RECOVERY */
        .hero {
            background: var(--sovereign-blue); /* Solid fallback for visibility */
            background: linear-gradient(rgba(0,51,102,0.9), rgba(0,51,102,0.9));
            color: white;
            text-align: center;
            padding: 80px 10%;
        }

        /* PILLAR ALIGNMENT GRID */
        .pillars {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }
    </style>
</head>
